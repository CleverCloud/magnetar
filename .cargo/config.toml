# Workspace cargo configuration.
#
# `--cfg tokio_unstable` is required by moonpool-core (which calls
# `tokio::task::Builder` — a tokio API gated behind this cfg). See moonpool's
# own build setup at https://github.com/PierreZ/moonpool.
#
# `--cfg tracing_unstable` is required by moonpool-sim on git `main` (it uses
# `tracing::field::valuable` for structured sim-event records — an unstable
# tracing API gated behind both the `valuable` feature AND this cfg).
# moonpool-sim is a dev-dependency, so only the `--all-targets` / test builds
# pull it in, but the flag is harmless for the non-test build. Mirrors
# moonpool's own `.cargo/config.toml` (`tokio_unstable` + `tracing_unstable`).
#
# These cfgs also surface other tokio "unstable" APIs (`task_locals_wrapper`,
# `runtime::Handle::dump`, etc.). magnetar itself does NOT rely on them; the
# flags are here solely to satisfy the moonpool crates. CI runs the build with
# these flags too — keep them in sync.

[build]
rustflags = ["--cfg", "tokio_unstable", "--cfg", "tracing_unstable"]
