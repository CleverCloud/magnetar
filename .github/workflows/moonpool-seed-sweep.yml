name: Moonpool seed sweep

# Daily random-seed *discovery* sweep of `magnetar-runtime-moonpool`.
# ADR-0036 set the cadence (daily random vs. fixed per-PR); ADR-0047 adds
# the persistence + per-PR replay layer on top — once this workflow flags
# a seed, the failure-report job opens a GitHub issue and the human/agent
# triaging the issue appends the seed to
# `crates/magnetar-runtime-moonpool/seeds/known-failing.toml`. From there
# the `seed-replay` job in `.github/workflows/ci.yml` keeps replaying it
# on every PR until the underlying bug is fixed and the entry removed.
#
# A freshly-rolled set of 16 random `u64` seeds runs in parallel each
# day. Local reproduction is `MOONPOOL_SEED=<seed> cargo test -p
# magnetar-runtime-moonpool --features crypto-aws-lc-rs --locked`.
#
# Security note: no `github.event.*` inputs are interpolated anywhere
# in this workflow's `run:` blocks. The only matrix expansion comes
# from `steps.roll.outputs.seeds`, which is produced by this workflow's
# own `generate-seeds` job using Python's `secrets` module — controlled
# input, not user-supplied. The `report-failures` job uses `GITHUB_TOKEN`
# strictly for `gh issue` calls.

on:
  schedule:
    # 03:17 UTC daily. Off-the-hour to avoid contention with the GH
    # Actions scheduler burst at :00.
    - cron: '17 3 * * *'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

# `report-failures` opens GitHub issues for newly-discovered failing
# seeds (ADR-0047 §3). The matrix jobs themselves only need `contents:
# read` (default).
permissions:
  contents: read
  issues: write

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings --cfg tokio_unstable --cfg tracing_unstable"
  RUSTDOCFLAGS: "-D warnings --cfg tokio_unstable --cfg tracing_unstable"
  CARGO_INCREMENTAL: 0
  CARGO_NET_RETRY: 5
  CARGO_NET_GIT_FETCH_WITH_CLI: true

jobs:
  generate-seeds:
    name: roll 16 random seeds
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      seeds: ${{ steps.roll.outputs.seeds }}
    steps:
      - id: roll
        run: |
          set -euo pipefail
          seeds=$(python3 - <<'PY'
          import json, secrets
          print(json.dumps([f"0x{secrets.randbits(64):016x}" for _ in range(16)]))
          PY
          )
          {
            echo "seeds=${seeds}"
          } >> "$GITHUB_OUTPUT"
          echo "Rolled seeds:"
          echo "${seeds}"

  moonpool-sim:
    name: moonpool-sim (seed=${{ matrix.seed }})
    needs: generate-seeds
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        seed: ${{ fromJSON(needs.generate-seeds.outputs.seeds) }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      # Single crypto provider per ADR-0035 (the providers are mutually
      # pluggable; `--all-features` is reserved for the per-cell
      # `check-crypto-matrix` xtask). Same invocation as the per-PR
      # `seed-replay` job in `.github/workflows/ci.yml` so the
      # discovery axis and the replay axis are bit-for-bit comparable.
      - name: Build moonpool engine
        run: |
          cargo build -p magnetar-runtime-moonpool \
            --no-default-features --features crypto-aws-lc-rs --locked
      - name: Run moonpool-sim test suite
        env:
          MOONPOOL_SEED: ${{ matrix.seed }}
        run: |
          cargo test -p magnetar-runtime-moonpool \
            --no-default-features --features crypto-aws-lc-rs --locked
      # Record the seed for the report-failures job. We write the value
      # to `failed.txt` only if the previous step failed; the artifact
      # is always uploaded so the downstream job's `download-artifact`
      # never errors on a missing artifact.
      - name: Record failing seed for downstream report
        if: failure()
        env:
          MATRIX_SEED: ${{ matrix.seed }}
        run: |
          set -euo pipefail
          echo "${MATRIX_SEED}" > failed.txt
      - name: Upload failure marker
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          # Hex seeds are alphanumeric; safe inside an artifact name.
          name: failing-seed-${{ matrix.seed }}
          path: failed.txt
          if-no-files-found: ignore
          retention-days: 14

  report-failures:
    # Opens one GitHub issue per failing seed (ADR-0047 §3). Runs only
    # when at least one matrix entry failed. Idempotent: an existing
    # open issue whose title contains the seed value is left alone (a
    # comment is appended pointing at the new run).
    name: open issues for newly-failed seeds
    needs: moonpool-sim
    if: failure()
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Download failure markers
        uses: actions/download-artifact@v4
        with:
          path: failure-markers
          pattern: failing-seed-*
          merge-multiple: false
      - name: Ensure issue labels exist
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          # Idempotent — create if missing, otherwise the `|| true` swallows
          # the "label already exists" error.
          gh label create seed-failure --repo "$REPO" \
            --color FBCA04 \
            --description "Failing moonpool sim seed (ADR-0047)" \
            2>/dev/null || true
          gh label create moonpool --repo "$REPO" \
            --color C5DEF5 \
            --description "magnetar-runtime-moonpool" \
            2>/dev/null || true
      - name: Open or update issues per failing seed
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          COMMIT_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          # Each `failing-seed-<seed>/failed.txt` contains the seed.
          shopt -s nullglob
          markers=(failure-markers/failing-seed-*/failed.txt)
          if [ "${#markers[@]}" -eq 0 ]; then
            echo "No failure markers found; nothing to report."
            exit 0
          fi
          for marker in "${markers[@]}"; do
            seed="$(cat "$marker" | tr -d '[:space:]')"
            [ -n "$seed" ] || continue
            title="moonpool sim: seed=${seed} reproduces against ${COMMIT_SHA:0:7}"
            # Search OPEN issues with this seed in the title; idempotent
            # against the daily sweep re-flagging the same seed.
            existing="$(gh issue list --repo "$REPO" --state open --search "in:title ${seed}" --json number --jq '.[0].number // empty')"
            body=$(cat <<EOF
          The daily moonpool-seed-sweep flagged \`MOONPOOL_SEED=${seed}\` as
          failing against [\`${COMMIT_SHA}\`](${RUN_URL}).

          Per [ADR-0047](../blob/main/specs/adr/0047-failing-seed-registry-per-pr-replay.md)
          this seed must now be either fixed or added to
          \`crates/magnetar-runtime-moonpool/seeds/known-failing.toml\`
          with \`status = "open"\` so the per-PR \`seed-replay\` job in
          \`.github/workflows/ci.yml\` catches any future regression.

          ### Reproduce locally

          \`\`\`
          MOONPOOL_SEED=${seed} cargo test -p magnetar-runtime-moonpool \\
              --features crypto-aws-lc-rs --locked
          \`\`\`

          ### Workflow run

          ${RUN_URL}

          If the seed fails to reproduce locally, the triage policy
          (ADR-0047 §4 case 3) requires a deep-dive anyway — "I can't
          repro" is not a close reason.
          EOF
          )
            if [ -n "$existing" ]; then
              echo "Issue #${existing} already tracks seed=${seed}; appending comment."
              gh issue comment "$existing" --repo "$REPO" --body "$body"
            else
              echo "Opening new issue for seed=${seed}."
              gh issue create --repo "$REPO" --title "$title" --body "$body" --label "seed-failure,moonpool"
            fi
          done
