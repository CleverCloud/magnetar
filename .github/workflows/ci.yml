name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Cancel previous in-flight runs of the same workflow on the same ref. This
# kicks in for both branch pushes (refs/heads/<name>, including main pushes
# and merges) and pull-request synchronisations (refs/pull/<num>/merge),
# so a rapid succession of pushes only ever consumes runner time for the
# latest commit.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings --cfg tokio_unstable --cfg tracing_unstable"
  RUSTDOCFLAGS: "-D warnings --cfg tokio_unstable --cfg tracing_unstable"
  CARGO_INCREMENTAL: 0
  CARGO_NET_RETRY: 5
  CARGO_NET_GIT_FETCH_WITH_CLI: true

jobs:
  fmt:
    name: fmt (nightly)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: rustfmt
      - run: cargo +nightly fmt --check --all

  clippy:
    name: clippy
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      # `magnetar-auth-sasl/kerberos` (and the façade's
      # `auth-sasl-kerberos`) pull in `libgssapi`, which links against
      # MIT KRB5 / GSSAPI. The Ubuntu runner has the runtime libraries
      # but not the development headers; install them so `--all-features`
      # can resolve `krb5-gssapi.pc`. See ADR-0029.
      - name: Install libkrb5-dev + libclang-dev (for libgssapi via bindgen)
        run: sudo apt-get update && sudo apt-get install -y libkrb5-dev libclang-dev
      - run: cargo clippy --workspace --all-features --all-targets -- -D warnings

  build:
    name: build (${{ matrix.toolchain }})
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        toolchain: [stable, beta]
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.toolchain }}
      - uses: Swatinem/rust-cache@v2
      # ADR-0029: `auth-sasl-kerberos` → `libgssapi` needs MIT KRB5
      # headers. Runtime libs ship by default; the -dev package only.
      - name: Install libkrb5-dev + libclang-dev (for libgssapi via bindgen)
        run: sudo apt-get update && sudo apt-get install -y libkrb5-dev libclang-dev
      - run: cargo build --workspace --all-features --locked

  test:
    name: test
    # Per ADR-0046 the e2e suite runs as part of the regular `test` job —
    # no separate `e2e` job, no `--features e2e`, no `#[ignore]`. The
    # `--all-features` build pulls in the e2e tests automatically because
    # the `#![cfg(feature = "e2e")]` gates are gone. Docker setup, image
    # pre-pulls, and the PIP-33 two-cluster docker-compose fixture all
    # live below.
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v6
      # The `--all-features` build (aws-lc-fips-sys's C build + every
      # crate + every test binary, test profile) outgrew the ~14GB
      # GitHub runner disk. Reclaim ~25GB of preinstalled SDKs first.
      - name: Free disk space
        uses: jlumbroso/free-disk-space@54081f138730dfa15788a46383842cd2f914a1be # v1.3.1
        with:
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          # Leave Docker, the tool-cache (rust toolchain), and swap alone.
          docker-images: false
          tool-cache: false
          swap-storage: false
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      # ADR-0029: `auth-sasl-kerberos` → `libgssapi` needs MIT KRB5
      # headers. Runtime libs ship by default; the -dev package only.
      - name: Install libkrb5-dev + libclang-dev (for libgssapi via bindgen)
        run: sudo apt-get update && sudo apt-get install -y libkrb5-dev libclang-dev
      # Pre-pull Docker images so the e2e suite (now part of `cargo test`)
      # doesn't pay the pull cost inside the test wall budget. ADR-0046.
      - name: Pre-pull Pulsar broker image
        run: docker pull apachepulsar/pulsar:4.0.4
      - name: Pre-pull KDC image (for the SASL Kerberos e2e)
        run: docker pull gcavalcante8808/krb5-server:latest || true
      # Bring up the PIP-33 two-cluster docker-compose fixture. ADR-0046
      # folded the former weekly `e2e-replicated-subs.yml` into per-PR CI
      # (the multi-cluster e2e_replicated_subscriptions test now runs
      # under `cargo test` like the rest of the e2e suite). The fixture
      # must be healthy *before* `cargo test` starts so the test can
      # connect to both brokers on `localhost:8080` / `localhost:8081`.
      - name: Bring up two-cluster Pulsar fixture (PIP-33)
        working-directory: crates/magnetar/tests/fixtures
        run: |
          set -euo pipefail
          docker compose -f docker-compose.replicated-subs.yml up -d
          # Wait for both brokers' admin endpoints to report healthy.
          for url in http://localhost:8080/admin/v2/brokers/health \
                     http://localhost:8081/admin/v2/brokers/health; do
            attempts=60
            until curl -sf "$url" >/dev/null; do
              attempts=$((attempts - 1))
              if [ "$attempts" -le 0 ]; then
                echo "broker @ $url did not become healthy in time"
                docker compose -f docker-compose.replicated-subs.yml ps
                docker compose -f docker-compose.replicated-subs.yml logs --tail=200
                exit 1
              fi
              sleep 2
            done
          done
      - name: Configure peer clusters + replicated subscription status
        working-directory: crates/magnetar/tests/fixtures
        run: ./configure_replicated_subs.sh
      - name: Run full test suite (incl. e2e)
        run: cargo test --workspace --all-features --locked -- --nocapture
      - name: Tear down two-cluster fixture
        if: always()
        working-directory: crates/magnetar/tests/fixtures
        run: docker compose -f docker-compose.replicated-subs.yml down -v || true
      - name: Dump two-cluster broker logs on failure
        if: failure()
        working-directory: crates/magnetar/tests/fixtures
        run: docker compose -f docker-compose.replicated-subs.yml logs --tail=500 || true

  seed-replay:
    # Per ADR-0047: replay every `status = "open"` seed listed in
    # `crates/magnetar-runtime-moonpool/seeds/known-failing.toml` on every
    # push to `main` and every PR. The daily moonpool-seed-sweep workflow
    # is still where new seeds get *discovered*; this job is where
    # already-known regressions get caught before they can re-merge.
    # No-op (trivially green) when the registry is empty.
    name: seed-replay (regression guard)
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Replay every open failing seed
        env:
          REGISTRY: crates/magnetar-runtime-moonpool/seeds/known-failing.toml
        run: |
          set -euo pipefail
          # Parse the TOML; emit `<value>` per `[[seed]]` with status="open".
          # Python 3.11+ ships `tomllib` in the stdlib; the ubuntu-latest
          # runner image carries 3.12.
          mapfile -t seeds < <(python3 - <<'PY'
          import tomllib, os, sys
          path = os.environ["REGISTRY"]
          try:
              with open(path, "rb") as fh:
                  data = tomllib.load(fh)
          except FileNotFoundError:
              sys.exit(0)
          for entry in data.get("seed", []):
              if entry.get("status", "open") == "open":
                  print(entry["value"])
          PY
          )
          if [ "${#seeds[@]}" -eq 0 ]; then
            echo "Registry has no open seeds — replay trivially passes."
            exit 0
          fi
          echo "Replaying ${#seeds[@]} open seed(s) from the registry:"
          printf '  %s\n' "${seeds[@]}"
          failed=()
          for seed in "${seeds[@]}"; do
            echo "::group::seed=${seed}"
            if MOONPOOL_SEED="${seed}" cargo test \
                -p magnetar-runtime-moonpool \
                --features crypto-aws-lc-rs --locked; then
              echo "::endgroup::"
              echo "  seed=${seed}: PASS (consider removing from the registry in the same PR)"
            else
              echo "::endgroup::"
              echo "::error title=Open seed reproduced::seed=${seed} reproduces; see ADR-0047."
              failed+=("${seed}")
            fi
          done
          if [ "${#failed[@]}" -gt 0 ]; then
            echo "Seeds that still reproduce: ${failed[*]}"
            exit 1
          fi
          echo "All open seeds passed — registry entries are stale and should be cleaned up."

  doc:
    name: doc
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      # ADR-0029: `auth-sasl-kerberos` → `libgssapi` needs MIT KRB5
      # headers for the rustdoc build under `--all-features`.
      - name: Install libkrb5-dev + libclang-dev (for libgssapi via bindgen)
        run: sudo apt-get update && sudo apt-get install -y libkrb5-dev libclang-dev
      - run: cargo doc --workspace --all-features --no-deps --locked

  deny:
    name: cargo-deny
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: EmbarkStudios/cargo-deny-action@v2

  no-channels:
    name: no-channels
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo run --manifest-path xtask/Cargo.toml -- check-no-channels

  no-io-deps:
    name: no-io-deps (magnetar-proto)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo run --manifest-path xtask/Cargo.toml -- check-no-io-deps

  no-internal-clock:
    name: no-internal-clock (magnetar-proto)
    # Asserts `magnetar-proto/src/**` never reads the host clock outside
    # `#[cfg(test)]` blocks + the two documented leak files. Mirrors ADR-0011
    # (clock-injection-sans-io). The sans-io state machine must receive
    # `now: Instant` / `wall_clock` providers from the engine.
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo run --manifest-path xtask/Cargo.toml -- check-no-internal-clock

  msrv:
    name: msrv (1.88)
    # Pin-check against the workspace MSRV declared in `Cargo.toml`
    # (`[workspace.package] rust-version = "1.88"`, ADR-0007 — bumped from 1.85 in chore(deps) refresh; rationale: let-chain stabilization in 1.88 used at `magnetar-proto/src/conn.rs`). Builds
    # the whole workspace with `--all-features` on Rust 1.88 so that
    # accidental use of newer language or `std` features fails CI rather
    # than slipping into a release. Mirrors the `build` job but with the
    # toolchain pinned exactly to the MSRV, not the rolling stable.
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@1.88.0
      - uses: Swatinem/rust-cache@v2
      # ADR-0029: `auth-sasl-kerberos` → `libgssapi` needs MIT KRB5
      # headers under `--all-features`.
      - name: Install libkrb5-dev + libclang-dev (for libgssapi via bindgen)
        run: sudo apt-get update && sudo apt-get install -y libkrb5-dev libclang-dev
      - run: cargo build --workspace --all-features --locked

  codegen-check:
    name: codegen drift (magnetar-proto)
    # Verify-only run of `cargo xtask codegen --check`. Fails if the
    # committed `magnetar-proto/src/pb/` contents diverge from what
    # regenerating from the vendored proto files would produce. Mirrors
    # the validation chain documented in `CLAUDE.md`; without this gate
    # proto codegen drift would go silent.
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      # `prost-build` (xtask codegen) shells out to `protoc`. The other
      # workspace jobs rely on `cargo build`-time vendored bins via
      # `protobuf-src` (transitive through `prost-build`'s build deps),
      # but the standalone xtask invocation expects `protoc` on PATH.
      - name: Install protoc (for prost-build via xtask codegen)
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      - run: cargo run --manifest-path xtask/Cargo.toml -- codegen --check

  # NOTE: the moonpool deterministic-simulation seed sweep lives in its
  # own workflow, `moonpool-seed-sweep.yml`, which runs daily on a cron
  # schedule with 16 freshly-generated random seeds in parallel. Per
  # ADR-0036, fixed seeds in per-PR / per-push CI are useless — they
  # always cover the same scheduling — while random seeds over time
  # cover the seed space much better. The regular `test` job above
  # still exercises `magnetar-runtime-moonpool` under the default seed
  # on every PR / push.

  # The former standalone `e2e` job is gone per ADR-0046 — its work is
  # folded into the `test` job above (Docker pre-pulls + two-cluster
  # docker-compose fixture + `cargo test --workspace --all-features`).
  # One job, one Cargo profile, one validation pass per PR.

  mutants-smoke:
    name: cargo-mutants smoke (magnetar-proto)
    runs-on: ubuntu-latest
    timeout-minutes: 180
    if: ${{ github.event_name == 'workflow_dispatch' }}
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo install cargo-mutants --locked
      - run: cargo mutants --package magnetar-proto --timeout 60 --no-shuffle

  fuzz-smoke:
    name: cargo-fuzz smoke (magnetar-proto)
    runs-on: ubuntu-latest
    timeout-minutes: 60
    if: ${{ github.event_name == 'workflow_dispatch' || github.event_name == 'pull_request' }}
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@nightly
      - uses: Swatinem/rust-cache@v2
      - run: cargo install cargo-fuzz --locked
      - name: Fuzz decode_one (60s budget)
        working-directory: crates/magnetar-proto
        run: cargo +nightly fuzz run decode_one -- -max_total_time=60 -timeout=10
      - name: Fuzz encode_roundtrip (60s budget)
        working-directory: crates/magnetar-proto
        run: cargo +nightly fuzz run encode_roundtrip -- -max_total_time=60 -timeout=10
