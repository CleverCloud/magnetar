name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Cancel previous in-flight runs of the same workflow on the same ref. This
# kicks in for both branch pushes (refs/heads/<name>, including main pushes
# and merges) and pull-request synchronisations (refs/pull/<num>/merge),
# so a rapid succession of pushes only ever consumes runner time for the
# latest commit.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings --cfg tokio_unstable"
  RUSTDOCFLAGS: "-D warnings --cfg tokio_unstable"
  CARGO_INCREMENTAL: 0
  CARGO_NET_RETRY: 5
  CARGO_NET_GIT_FETCH_WITH_CLI: true

jobs:
  fmt:
    name: fmt (nightly)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: rustfmt
      - run: cargo +nightly fmt --check --all

  clippy:
    name: clippy
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace --all-features --all-targets -- -D warnings

  build:
    name: build (${{ matrix.toolchain }})
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        toolchain: [stable, beta]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.toolchain }}
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --workspace --all-features --locked

  test:
    name: test
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace --all-features --locked

  doc:
    name: doc
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo doc --workspace --all-features --no-deps --locked

  deny:
    name: cargo-deny
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2

  no-channels:
    name: no-channels
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo run --manifest-path xtask/Cargo.toml -- check-no-channels

  no-io-deps:
    name: no-io-deps (magnetar-proto)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo run --manifest-path xtask/Cargo.toml -- check-no-io-deps

  no-internal-clock:
    name: no-internal-clock (magnetar-proto)
    # Asserts `magnetar-proto/src/**` never reads the host clock outside
    # `#[cfg(test)]` blocks + the two documented leak files. Mirrors ADR-0011
    # (clock-injection-sans-io). The sans-io state machine must receive
    # `now: Instant` / `wall_clock` providers from the engine.
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo run --manifest-path xtask/Cargo.toml -- check-no-internal-clock

  msrv:
    name: msrv (1.85)
    # Pin-check against the workspace MSRV declared in `Cargo.toml`
    # (`[workspace.package] rust-version = "1.85"`, ADR-0007). Builds
    # the whole workspace with `--all-features` on Rust 1.85 so that
    # accidental use of newer language or `std` features fails CI rather
    # than slipping into a release. Mirrors the `build` job but with the
    # toolchain pinned exactly to the MSRV, not the rolling stable.
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.85.0
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --workspace --all-features --locked

  codegen-check:
    name: codegen drift (magnetar-proto)
    # Verify-only run of `cargo xtask codegen --check`. Fails if the
    # committed `magnetar-proto/src/pb/` contents diverge from what
    # regenerating from the vendored proto files would produce. Mirrors
    # the validation chain documented in `CLAUDE.md`; without this gate
    # proto codegen drift would go silent.
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo run --manifest-path xtask/Cargo.toml -- codegen --check

  # NOTE: the moonpool deterministic-simulation seed sweep lives in its
  # own workflow, `moonpool-seed-sweep.yml`, which runs daily on a cron
  # schedule with 16 freshly-generated random seeds in parallel. Per
  # ADR-0036, fixed seeds in per-PR / per-push CI are useless — they
  # always cover the same scheduling — while random seeds over time
  # cover the seed space much better. The regular `test` job above
  # still exercises `magnetar-runtime-moonpool` under the default seed
  # on every PR / push.

  e2e:
    name: e2e (Pulsar 4.x standalone)
    runs-on: ubuntu-latest
    # Always runs on pushes to main and on PRs targeting main so the
    # behavioural parity suite gates merges. workflow_dispatch lets
    # maintainers retrigger after a docker-hub blip. Job-level timeout
    # covers Pulsar startup (~60s) + the full e2e suite (10 files,
    # including transactions and compacted topics) with headroom.
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Pre-pull Pulsar image (caches the layer for faster container startup)
        run: docker pull apachepulsar/pulsar:4.0.4
      - name: Run e2e suite
        run: cargo test --workspace --features e2e --locked -- --nocapture
        timeout-minutes: 75

  mutants-smoke:
    name: cargo-mutants smoke (magnetar-proto)
    runs-on: ubuntu-latest
    timeout-minutes: 180
    if: ${{ github.event_name == 'workflow_dispatch' }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo install cargo-mutants --locked
      - run: cargo mutants --package magnetar-proto --timeout 60 --no-shuffle

  fuzz-smoke:
    name: cargo-fuzz smoke (magnetar-proto)
    runs-on: ubuntu-latest
    timeout-minutes: 60
    if: ${{ github.event_name == 'workflow_dispatch' || github.event_name == 'pull_request' }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
      - uses: Swatinem/rust-cache@v2
      - run: cargo install cargo-fuzz --locked
      - name: Fuzz decode_one (60s budget)
        working-directory: crates/magnetar-proto
        run: cargo +nightly fuzz run decode_one -- -max_total_time=60 -timeout=10
      - name: Fuzz encode_roundtrip (60s budget)
        working-directory: crates/magnetar-proto
        run: cargo +nightly fuzz run encode_roundtrip -- -max_total_time=60 -timeout=10
