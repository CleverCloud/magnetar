name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings --cfg tokio_unstable"
  RUSTDOCFLAGS: "-D warnings --cfg tokio_unstable"
  CARGO_INCREMENTAL: 0
  CARGO_NET_RETRY: 5
  CARGO_NET_GIT_FETCH_WITH_CLI: true

jobs:
  fmt:
    name: fmt (nightly)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: rustfmt
      - run: cargo +nightly fmt --check --all

  clippy:
    name: clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace --all-features --all-targets -- -D warnings

  build:
    name: build (${{ matrix.toolchain }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        toolchain: [stable, beta]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.toolchain }}
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --workspace --all-features --locked

  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace --all-features --locked

  doc:
    name: doc
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo doc --workspace --all-features --no-deps --locked

  deny:
    name: cargo-deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2

  no-channels:
    name: no-channels
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo run --manifest-path xtask/Cargo.toml -- check-no-channels

  no-io-deps:
    name: no-io-deps (magnetar-proto)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo run --manifest-path xtask/Cargo.toml -- check-no-io-deps

  moonpool-sim:
    name: moonpool deterministic-simulation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build moonpool engine
        run: cargo build -p magnetar-runtime-moonpool --all-features --locked
      - name: Run moonpool-sim test suite
        # The moonpool engine carries its own deterministic-simulation tests
        # (driver + client + producer + consumer façades, TLS handshake under
        # chaos). They are pure unit / integration tests inside
        # `magnetar-runtime-moonpool` — no Docker needed and they reproduce
        # bit-for-bit under a given seed.
        run: cargo test -p magnetar-runtime-moonpool --all-features --locked

  e2e:
    name: e2e (Pulsar 4.x standalone)
    runs-on: ubuntu-latest
    # Always runs on pushes to main and on PRs targeting main so the
    # behavioural parity suite gates merges. workflow_dispatch lets
    # maintainers retrigger after a docker-hub blip.
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Pre-pull Pulsar image (caches the layer for faster container startup)
        run: docker pull apachepulsar/pulsar:4.0.4
      - name: Run e2e suite
        run: cargo test --workspace --features e2e --locked -- --nocapture
        timeout-minutes: 30

  mutants-smoke:
    name: cargo-mutants smoke (magnetar-proto)
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo install cargo-mutants --locked
      - run: cargo mutants --package magnetar-proto --timeout 60 --no-shuffle

  fuzz-smoke:
    name: cargo-fuzz smoke (magnetar-proto)
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event_name == 'pull_request' }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
      - uses: Swatinem/rust-cache@v2
      - run: cargo install cargo-fuzz --locked
      - name: Fuzz decode_one (60s budget)
        working-directory: crates/magnetar-proto
        run: cargo +nightly fuzz run decode_one -- -max_total_time=60 -timeout=10
      - name: Fuzz encode_roundtrip (60s budget)
        working-directory: crates/magnetar-proto
        run: cargo +nightly fuzz run encode_roundtrip -- -max_total_time=60 -timeout=10
