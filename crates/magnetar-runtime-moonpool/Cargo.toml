[package]
name        = "magnetar-runtime-moonpool"
description = "moonpool runtime engine for magnetar — deterministic-sim friendly. Custom rustls-over-bytepipe TLS adapter. No channels."
version       = { workspace = true }
edition       = { workspace = true }
rust-version  = { workspace = true }
license       = { workspace = true }
authors       = { workspace = true }
repository    = { workspace = true }
homepage      = { workspace = true }
readme        = "../../README.md"
keywords      = { workspace = true }
categories    = { workspace = true }

[lints]
workspace = true

[dependencies]
magnetar-proto = { workspace = true }
bytes          = { workspace = true }
moonpool-core  = { workspace = true }
parking_lot    = { workspace = true }
rustls         = { workspace = true }
slab           = { workspace = true }
tokio          = { workspace = true, features = ["sync", "macros", "rt", "time", "io-util"] }
tracing        = { workspace = true }
thiserror      = { workspace = true }

[dev-dependencies]
# Integration-test surface (crates/magnetar-runtime-moonpool/tests/**). The
# M7 chaos pack drives the sans-io state machine through `ConnectionShared`
# with synthetic broker frames and synthetic `Instant`s — no listener, no
# wall-clock, no Docker. tokio's paused-time runtime supplies the virtual
# clock for `send_timeout` / `ack_timeout` / OAuth refresh-edge scenarios.
tokio          = { workspace = true, features = ["sync", "macros", "rt", "rt-multi-thread", "time", "io-util", "net", "test-util"] }
