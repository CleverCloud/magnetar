# cargo-deny configuration for magnetar.
# See https://embarkstudios.github.io/cargo-deny/
#
# `[bans].deny[].wrappers` is the cargo-deny syntax for "ban this crate
# UNLESS it is pulled by one of these specific parents". Used here to
# admit `openssl` / `openssl-sys` only when they show up beneath the
# `rustls-openssl` rustls crypto provider crate (issue #9, ADR-0035).
# Requires cargo-deny >= 0.14.
#
# `[graph] all-features = true` is intentional: it unions every
# `crypto-*` feature so the openssl carve-out is exercised in the same
# pass as the aws-lc-rs / ring / fips paths. The cfg cascade in
# `magnetar-runtime-{tokio,moonpool}::tls_crypto` resolves multiple
# providers deterministically at compile time.

[graph]
all-features = true

[advisories]
version = 2
yanked = "deny"
ignore = []

[licenses]
version = 2
confidence-threshold = 0.93
allow = [
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "MIT",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
    "CC0-1.0",
    "OpenSSL",
    "CDLA-Permissive-2.0",  # webpki-roots (Mozilla trust anchors)
    "MPL-2.0",              # may appear in transitive deps
]
private = { ignore = true }

[bans]
multiple-versions = "warn"
wildcards         = "deny"
highlight         = "all"
workspace-default-features = "allow"

deny = [
    # Magnetar bans channels of any flavour. See ../GUIDELINES.md for the rationale and
    # the Arc<Mutex<State>> + Notify + Waker-slab replacement pattern.
    { name = "crossbeam-channel", reason = "magnetar bans channels" },
    { name = "flume",             reason = "magnetar bans channels" },
    { name = "async-channel",     reason = "magnetar bans channels" },
    { name = "kanal",             reason = "magnetar bans channels" },
    { name = "postage",           reason = "magnetar bans channels" },
    { name = "tachyonix",         reason = "magnetar bans channels" },
    { name = "thingbuf",          reason = "magnetar bans channels" },
    # No native-tls — rustls is the only TLS implementation we ship.
    # `openssl` / `openssl-sys` are conditionally allowed (issue #9,
    # ADR-0035) ONLY when they show up beneath `rustls-openssl`, which
    # is the rustls crypto-provider wrapper around system OpenSSL.
    # `openssl-sys` is also wrapped by `openssl` (the high-level Rust
    # binding), which is itself only allowed beneath `rustls-openssl`.
    # Any other parent (e.g. a hypothetical `reqwest` switch to
    # `native-tls`) still trips the deny.
    { name = "native-tls",        reason = "magnetar uses rustls only" },
    { name = "openssl",           reason = "magnetar uses rustls only; allowed transitively via rustls-openssl", wrappers = ["rustls-openssl"] },
    { name = "openssl-sys",       reason = "magnetar uses rustls only; allowed transitively via rustls-openssl (openssl is the high-level wrapper)", wrappers = ["rustls-openssl", "openssl"] },
]
skip       = []
skip-tree  = []

[sources]
unknown-registry = "deny"
unknown-git      = "deny"
allow-registry   = ["https://github.com/rust-lang/crates.io-index"]
allow-git        = []
